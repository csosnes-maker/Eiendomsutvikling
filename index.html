<!DOCTYPE html>
<html>
  <head>
    <title>Dashboard</title>
  </head>
  <body>
    <h1>Eiendomsutvikling Dashboard</h1>
    <div id="app"></div>

    <script>
      const projects = [
        { name: "Test prosjekt", status: "active" }
      ];

      const app = document.getElementById("app");

      projects.forEach(p => {
        const div = document.createElement("div");
        div.innerText = p.name + " - " + p.status;
        app.appendChild(div);
      });
    </script>
  </body>
</html>
